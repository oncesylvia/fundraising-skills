<rect x="0" y="0" width="1200" height="8" fill="#2BB789"/>

<text x="64" y="96" fill="#2BB789" font-family="sans-serif" font-size="23" font-weight="500">Open-source skills for Claude Code</text>
<text x="1136" y="96" fill="#99A2AE" font-family="sans-serif" font-size="19" text-anchor="end">built by a founder, mid-raise</text>

<text x="64" y="186" fill="#F4F6F8" font-family="sans-serif" font-size="52" font-weight="500">Find the right investors.</text>
