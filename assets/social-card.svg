<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Fundraising Skills social card</title>
<desc>Open-source Claude Code skills for founder-led fundraising: no hallucinated investor lists, no spray-and-pray, bilingual EN and Chinese. 8 skills, MIT, free. github.com/oncesylvia/fundraising-skills.</desc>
