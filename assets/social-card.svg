<text x="104" y="396" fill="#E4E8EC" font-family="sans-serif" font-size="24">No spray-and-pray — personal, true, compliant</text>

<polyline points="64,450 73,460 90,438" fill="none" stroke="#2BB789" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
<text x="104" y="458" fill="#E4E8EC" font-family="sans-serif" font-size="24">Bilingual EN / 中文 — for US &amp; China raising</text>

<rect x="828" y="150" width="300" height="40" rx="10" fill="#13463A"/>
<rect x="853" y="206" width="250" height="40" rx="10" fill="#15604E"/>
